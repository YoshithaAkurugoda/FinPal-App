# OPTIONAL — local Postgres + Redis only if you are not using Supabase + Upstash.
# Intended path: cloud URLs in server/.env (see README and .env.example).
#
# If you use this file, point DATABASE_URL / DIRECT_URL / REDIS_URL at localhost
# (see comments below). Postgres is on host 5433 to avoid clashing with an
# existing PostgreSQL service on 5432.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: finpal
    ports:
      - "5433:5432"
    volumes:
      - finpal_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finpal"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  finpal_pg_data:
